<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>Pacientes</title>
    <style>
        body { background-color: #f0f4f8; font-family: 'Segoe UI', sans-serif; }
        .navbar-custom { background-color: #1a3c5e; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark navbar-custom px-4 py-3">
        <span class="navbar-brand fw-bold text-center">
            <h2 class="fw-bold text-white mb-0">Lista de pacientes</h2>
        </span>
    </nav>
    
    <div class="d-flex justify-content-between align-items-center px-3 my-3 mx-auto" style="max-width:800px;">
        <a href="/" class="btn btn-dark">← Inicio</a>
        <button class="btn btn-dark" data-bs-toggle="modal" data-bs-target="#crearModal">
            + Nuevo Paciente
        </button>
    </div>

    <div class="table-responsive mx-auto p-2" style="max-width:800px;">
        <table class="table table-striped table-hover align-middle border">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Apellido</th>
                    <th>Diagnóstico</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for paciente in pacientes %}
                <tr>
                    <td>{{ paciente[0] }}</td> 
                    <td>{{ paciente[1] }}</td> 
                    <td>{{ paciente[2] }}</td> 
                    <td>
                        {% if paciente[3] %}
                            {{ paciente[3] }}
                        {% else %}
                            <span class="text-muted">Sin Diagnóstico</span>
                        {% endif %}
                    </td> 
                    <td>
                        <button class="btn btn-outline-dark btn-sm" data-bs-toggle="modal" data-bs-target="#editarModal{{ paciente[0] }}">
                            EDITAR
                        </button>
                        <button type="button" onclick="confirmarEliminar('{{ paciente[0] }}')" class="btn btn-sm btn-danger">Eliminar</button>
                    </td>
                </tr>
                
                <div class="modal fade" id="editarModal{{ paciente[0] }}" tabindex="-1">
                    <div class="modal-dialog">
                        <div class="modal-content">
                            <form action="{{ url_for('editar_paciente', id=paciente[0]) }}" method="post">
                                <div class="modal-header">
                                    <h5 class="modal-title">Editar Paciente</h5>
                                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                </div>
                                <div class="modal-body">
                                    <div class="mb-3">
                                        <label class="form-label">Nombre</label>
                                        <input type="text" name="nombre" class="form-control" value="{{ paciente[1] }}" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Apellido</label>
                                        <input type="text" name="apellido" class="form-control" value="{{ paciente[2] }}" required>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Tipo de Diagnóstico</label>
                                        <select name="tipo_diagnostico_id" class="form-select">
                                            <option value="">-- Sin Diagnóstico --</option>
                                            {% for t in tipos %}
                                                <option value="{{ t[0] }}" {{ 'selected' if t[0] == paciente[4] else '' }}>
                                                    {{ t[1] }}
                                                </option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                </div>
                                <div class="modal-footer">
                                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                                    <button type="submit" class="btn btn-dark">Guardar cambios</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <div class="modal fade" id="crearModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <!-- la url es para llamar a la funcion crear_paciente de la app.py -->
                <form action="{{ url_for('crear_paciente') }}" method="post">
                    <div class="modal-header">
                        <h5 class="modal-title">Nuevo Paciente</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">
                        <div class="mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" name="nombre" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Apellido</label>
                            <input type="text" name="apellido" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Tipo de Diagnóstico</label>
                            <select name="tipo_diagnostico_id" class="form-select">
                                <option value="">-- Seleccionar --</option>
                                {% for t in tipos %}
                                    <option value="{{ t[0] }}">{{ t[1] }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-dark">Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

<script>
function confirmarEliminar(id){
    Swal.fire({
        title: '¿Estás seguro?',
        text: "No podrás recuperar este paciente",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#212529',
        cancelButtonColor: '#6c757d',
        confirmButtonText: 'Sí, eliminar',
        cancelButtonText: 'Cancelar'
    }).then((result) => {
        if (result.isConfirmed) {
            window.location.href = "/lista_pacientes/eliminar/" + id;
        }
    });
}
</script>
</body>
</html>
